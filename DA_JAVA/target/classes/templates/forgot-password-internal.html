<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quên mật khẩu nội bộ</title>
    <link rel="stylesheet" th:href="@{/css/app.css(v='20260524-customer-security')}">
</head>
<body class="auth-page">
<main class="auth-shell">
    <section class="brand-panel">
        <div class="brand-mark">CM</div>
        <p class="eyebrow">Internal recovery</p>
        <h1>Lấy lại tài khoản nội bộ</h1>
        <p class="lead">Mã xác thực chỉ được gửi khi tài khoản và email trùng đúng thông tin đã lưu.</p>
        <div class="feature-grid">
            <span>Admin</span>
            <span>Nhân viên</span>
            <span>Xác nhận bằng email</span>
            <span>Tài khoản đang hoạt động</span>
        </div>
    </section>

    <section class="auth-card focused-auth-card">
        <a class="back-link" th:href="@{/login/internal}">← Quay lại đăng nhập nội bộ</a>
        <div th:if="${success}" class="alert success" th:text="${success}"></div>
        <div th:if="${error}" class="alert danger" th:text="${error}"></div>

        <p class="eyebrow">Admin / Staff</p>
        <h2>Nhận mã xác thực</h2>
        <form th:action="@{/forgot-password/internal}" method="post" class="form-stack">
            <label>Tài khoản
                <input name="username" autocomplete="username" placeholder="admin hoặc staff" required>
            </label>
            <label>Email tài khoản
                <input name="email" type="email" autocomplete="email" placeholder="nhanvien@gmail.com" required>
            </label>
            <button class="primary wide" type="submit">Gửi mã OTP</button>
        </form>
    </section>
</main>
</body>
</html>
