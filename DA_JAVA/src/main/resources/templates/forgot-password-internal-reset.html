<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đặt lại mật khẩu nội bộ</title>
    <link rel="stylesheet" th:href="@{/css/app.css(v='20260524-customer-security')}">
</head>
<body class="auth-page">
<main class="auth-shell narrow">
    <section class="auth-card focused-auth-card">
        <div th:if="${error}" class="alert danger" th:text="${error}"></div>
        <p class="eyebrow">OTP hợp lệ</p>
        <h2>Tạo mật khẩu mới</h2>
        <form th:action="@{/forgot-password/internal/reset}" method="post" class="form-stack">
            <label>Mật khẩu mới
                <input name="newPassword" type="password" autocomplete="new-password" minlength="4" required>
            </label>
            <label>Nhập lại mật khẩu
                <input name="confirmPassword" type="password" autocomplete="new-password" minlength="4" required>
            </label>
            <button class="primary wide" type="submit">Lưu mật khẩu mới</button>
        </form>
    </section>
</main>
</body>
</html>
